<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 135" role="img" aria-label="ATN Book &amp; Crafts">

  <defs>
    <filter id="bm-shadow" x="-6%" y="-6%" width="116%" height="116%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!--
    ViewBox 250×135, V-point at (220, 67.5), translate(22,18)
    Padding:  left 25 px · top 20 px · right 27 px · bottom 19 px
  -->
  <path d="M 0,0 L 250,0 L 220,67.5 L 250,135 L 0,135 Z"
        fill="#ecdfd2" filter="url(#bm-shadow)"/>
  <!-- thin inner blue border, ~3 px inset -->
  <path d="M 3,3 L 247,3 L 217,67.5 L 247,132 L 3,132 Z"
        fill="none" stroke="#213885" stroke-width="1.5"/>

  <g transform="translate(22,18)">

    <!-- Circles -->
    <circle cx="27"  cy="40" r="24" fill="#006838"/>
    <circle cx="87"  cy="34" r="32" fill="#006838"/>
    <circle cx="147" cy="40" r="24" fill="#006838"/>

    <!-- Letters: red fill, 2 px yellow outer stroke -->
    <text x="27" y="40"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="38" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">A</text>

    <text x="87" y="34"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="54" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">T</text>

    <text x="147" y="40"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="38" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">N</text>

    <!-- "Book & Crafts" -->
    <text x="86.5" y="86"
          text-anchor="middle" dominant-baseline="central"
          fill="#213885"
          font-size="24" font-weight="900" letter-spacing="0.8"
          font-family="'Arial Black',Arial,'Helvetica Neue',sans-serif">Book &amp; Crafts</text>

  </g>

</svg>
