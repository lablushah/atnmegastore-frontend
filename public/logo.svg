<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 83" role="img" aria-label="ATN Book &amp; Crafts">

  <!-- Left circle – A (smaller) -->
  <circle cx="28" cy="40" r="26" fill="#006838"/>

  <!-- Middle circle – T (larger, raised) -->
  <circle cx="82" cy="34" r="32" fill="#006838"/>

  <!-- Right circle – N (smaller) -->
  <circle cx="136" cy="40" r="26" fill="#006838"/>

  <!-- Red letters, vertically and horizontally centred in each circle -->
  <text x="28" y="40"
        text-anchor="middle" dominant-baseline="central"
        fill="#ED1C24"
        font-size="30" font-weight="900"
        font-family="'Arial Black','Impact',Arial,sans-serif">A</text>

  <text x="82" y="34"
        text-anchor="middle" dominant-baseline="central"
        fill="#ED1C24"
        font-size="40" font-weight="900"
        font-family="'Arial Black','Impact',Arial,sans-serif">T</text>

  <text x="136" y="40"
        text-anchor="middle" dominant-baseline="central"
        fill="#ED1C24"
        font-size="30" font-weight="900"
        font-family="'Arial Black','Impact',Arial,sans-serif">N</text>

  <!-- "Book & Crafts" rounded-rectangle badge -->
  <rect x="4" y="68" width="157" height="14" rx="7"
        fill="white" stroke="#213885" stroke-width="1.5"/>

  <text x="82" y="75"
        text-anchor="middle" dominant-baseline="central"
        fill="#213885"
        font-size="9" font-weight="bold" letter-spacing="1"
        font-family="Arial,'Helvetica Neue',sans-serif">Book &amp; Crafts</text>

</svg>
