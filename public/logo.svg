<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 195 143" role="img" aria-label="ATN Book &amp; Crafts">

  <defs>
    <!-- Subtle drop shadow to give the bookmark a lifted feel -->
    <filter id="bm-shadow" x="-6%" y="-4%" width="114%" height="114%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000028"/>
    </filter>
  </defs>

  <!--
    Bookmark shape:
      flat top + straight sides + V-notch pointing upward from bottom center
      Rectangle corners at y=143; V-point rises to y=116 at x=97.5
      This gives a 27 px deep notch — classic ribbon-bookmark silhouette
  -->
  <path d="M 0,0 L 195,0 L 195,143 L 97.5,116 L 0,143 Z"
        fill="#C8D5ED" filter="url(#bm-shadow)"/>

  <!--
    Logo elements — translated (11, 10) to centre inside bookmark with padding:
      T-circle top  : 34-32+10 = 12 px from top edge
      badge bottom  : 72+28+10 = 110 px   (6 px above V-point at y=116)
      left edge     : 27-24+11 = 14 px from left
      right edge    : 147+24+11 = 182 px  (13 px from right edge 195)
  -->
  <g transform="translate(11,10)">

    <!-- Circles – 4 px gap between each pair -->
    <circle cx="27"  cy="40" r="24" fill="#006838"/>
    <circle cx="87"  cy="34" r="32" fill="#006838"/>
    <circle cx="147" cy="40" r="24" fill="#006838"/>

    <!-- Letters: red fill, 2 px yellow outer stroke -->
    <text x="27" y="40"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="38" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">A</text>

    <text x="87" y="34"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="54" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">T</text>

    <text x="147" y="40"
          text-anchor="middle" dominant-baseline="central"
          fill="#ED1C24" stroke="#FFD700" stroke-width="2" paint-order="stroke fill"
          font-size="38" font-weight="900"
          font-family="'Arial Black','Impact',Arial,sans-serif">N</text>

    <!-- Yellow "Book & Crafts" badge -->
    <rect x="4" y="72" width="165" height="28" rx="1"
          fill="#FFD700" stroke="#213885" stroke-width="1.5"/>

    <text x="86.5" y="86"
          text-anchor="middle" dominant-baseline="central"
          fill="#213885"
          font-size="18" font-weight="bold" letter-spacing="1"
          font-family="Arial,'Helvetica Neue',sans-serif">Book &amp; Crafts</text>

  </g>

</svg>
